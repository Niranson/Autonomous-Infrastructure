<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AIOps Sentinel | Control Plane</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .glass {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(148, 163, 184, 0.15);
        }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 20px;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-300 p-6 md:p-10 min-h-screen">
    <div class="max-w-7xl mx-auto">

        <!-- Navbar -->
        <nav class="glass rounded-3xl border border-slate-700/50 p-6 mb-10 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div
                    class="w-9 h-9 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-2xl flex items-center justify-center">
                    <i data-lucide="shield-check" class="text-white w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="title-font text-3xl font-semibold tracking-tighter text-white">Sentinel</h1>
                    <p class="text-[10px] text-slate-500 -mt-1 tracking-[1px] uppercase">AIOps Control Plane</p>
                </div>
            </div>

            <div class="flex items-center gap-8">
                <div
                    class="flex items-center gap-2 bg-emerald-500/10 text-emerald-400 px-4 py-2 rounded-2xl text-sm font-medium">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                    ALL SYSTEMS OPERATIONAL
                </div>

                <div class="text-right">
                    <p class="text-xs text-slate-500">Cluster • prod-eu-01</p>
                    <p class="text-sm font-medium text-white">Kubernetes v1.29</p>
                </div>
            </div>
        </nav>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">

            <div class="glass rounded-3xl p-8 card-hover">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p class="text-xs font-medium tracking-widest text-slate-400 uppercase">Telemetry Load</p>
                        <div id="cpu" class="text-5xl font-semibold text-white mt-2">0m</div>
                    </div>
                    <i data-lucide="cpu" class="w-10 h-10 text-cyan-400"></i>
                </div>
                <div class="h-2 bg-slate-800 rounded-full overflow-hidden">
                    <div id="cpu-bar"
                        class="h-full w-0 bg-gradient-to-r from-cyan-400 to-blue-500 rounded-full transition-all"></div>
                </div>
            </div>

            <div class="glass rounded-3xl p-8 card-hover border border-blue-500/20">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p class="text-xs font-medium tracking-widest text-blue-400 uppercase">AI Forecast (15m)</p>
                        <div id="pred" class="text-5xl font-semibold text-blue-400 mt-2">0m</div>
                    </div>
                    <i data-lucide="brain-circuit" class="w-10 h-10 text-blue-400"></i>
                </div>
                <p id="forecast-trend" class="text-emerald-400 text-sm flex items-center gap-1">
                    <i data-lucide="trending-up" class="w-4 h-4"></i>
                    Waiting for data...
                </p>
            </div>

            <div class="glass rounded-3xl p-8 card-hover">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p class="text-xs font-medium tracking-widest text-slate-400 uppercase">Active Replicas</p>
                        <div id="pods" class="text-5xl font-semibold text-white mt-2">0</div>
                    </div>
                    <i data-lucide="layers" class="w-10 h-10 text-violet-400"></i>
                </div>
                <div id="replicas-status" class="text-emerald-400 text-sm">• Loading...</div>
            </div>

            <div class="glass rounded-3xl p-8 card-hover">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p class="text-xs font-medium tracking-widest text-slate-400 uppercase">System Health</p>
                        <div id="anomaly" class="text-4xl font-semibold text-emerald-400 mt-2">HEALTHY</div>
                    </div>
                    <i data-lucide="shield-check" class="w-10 h-10 text-emerald-400"></i>
                </div>
                <p class="text-xs text-slate-400">No anomalies detected</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Logs -->
            <div class="lg:col-span-2 glass rounded-3xl p-8">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="flex items-center gap-3 text-sm font-semibold text-slate-300">
                        <i data-lucide="terminal" class="w-5 h-5 text-cyan-400"></i>
                        Decision Engine Logs
                    </h2>
                    <span class="text-xs px-3 py-1 bg-slate-800 rounded-full text-slate-400">LIVE</span>
                </div>
                <div id="logs" class="mono text-sm h-80 overflow-y-auto space-y-3 text-slate-300 pr-4 custom-scroll">
                    <!-- Logs will be populated by server -->
                </div>
            </div>

            <!-- Manual Override -->
            <div class="glass rounded-3xl p-8 flex flex-col">
                <h2 class="flex items-center gap-3 text-sm font-semibold mb-6">
                    <i data-lucide="command" class="w-5 h-5 text-amber-400"></i>
                    Manual Control
                </h2>

                <textarea id="manualCmd"
                    class="flex-1 bg-slate-950 border border-slate-700 rounded-2xl p-5 mono text-sm focus:outline-none focus:border-blue-500 resize-none"
                    placeholder="Enter kubectl command or custom action..."></textarea>

                <div class="mt-6 space-y-4">
                    <button onclick="executeManual()"
                        class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-white font-semibold py-4 rounded-2xl transition-all active:scale-95 flex items-center justify-center gap-2 shadow-lg shadow-blue-500/30">
                        <i data-lucide="play" class="w-4 h-4"></i>
                        EXECUTE COMMAND
                    </button>

                    <button onclick="sendAction('RESET')"
                        class="w-full border border-red-500/30 hover:bg-red-500/10 text-red-400 font-semibold py-4 rounded-2xl transition-all active:scale-95 flex items-center justify-center gap-2">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                        EMERGENCY RESET
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const socket = io();
        const logContainer = document.getElementById('logs');

        socket.on('stats_update', (data) => {
            // Update metrics (you will send these from server)
            document.getElementById('cpu').innerText = (data.cpu || 0) + 'm';
            document.getElementById('pred').innerText = (data.predicted || 0) + 'm';
            document.getElementById('pods').innerText = data.pods || 0;

            // Progress bar for CPU
            const cpuBar = document.getElementById('cpu-bar');
            const cpuValue = parseInt(data.cpu) || 0;
            cpuBar.style.width = Math.min(cpuValue / 10, 100) + '%';   // adjust logic as needed

            // Anomaly status
            const anomalyEl = document.getElementById('anomaly');
            if (data.anomaly) {
                anomalyEl.innerText = 'ANOMALY DETECTED';
                anomalyEl.className = 'text-4xl font-semibold text-red-400 mt-2';
            } else {
                anomalyEl.innerText = 'HEALTHY';
                anomalyEl.className = 'text-4xl font-semibold text-emerald-400 mt-2';
            }

            // Add log
            const newLog = document.createElement('div');
            newLog.innerHTML = `<span class="text-slate-500">[${new Date().toLocaleTimeString()}]</span> ${data.action || 'UPDATE'}`;
            logContainer.prepend(newLog);
        });

        async function executeManual() {
            const cmd = document.getElementById('manualCmd').value.trim();
            if (!cmd) return alert("Please enter a command");

            await fetch('/api/control', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'MANUAL', command: cmd })
            });
            document.getElementById('manualCmd').value = '';
        }

        async function sendAction(action) {
            await fetch('/api/control', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action })
            });
        }
    </script>
</body>

</html>
