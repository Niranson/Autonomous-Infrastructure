apiVersion: apps/v1
kind: Deployment
metadata:
  name: result-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result-service
  template:
    metadata:
      labels:
        app: result-service
    spec:
      containers:
        - name: result
          image: result-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
