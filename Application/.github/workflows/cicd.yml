name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # 🔐 Login to DockerHub
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🐳 Build & Push Gateway
    - name: Build & Push Gateway
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/gateway:latest ./gateway
        docker push ${{ secrets.DOCKER_USERNAME }}/gateway:latest

    # 🐳 Frontend
    - name: Build & Push Frontend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest ./frontend
        docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest

    # 🐳 Candidate
    - name: Build & Push Candidate
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/candidate-service:latest ./candidate-service
        docker push ${{ secrets.DOCKER_USERNAME }}/candidate-service:latest

    # 🐳 Voter
    - name: Build & Push Voter
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/voter-service:latest ./voter-service
        docker push ${{ secrets.DOCKER_USERNAME }}/voter-service:latest

    # 🐳 Vote
    - name: Build & Push Vote
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/vote-service:latest ./vote-service
        docker push ${{ secrets.DOCKER_USERNAME }}/vote-service:latest

    # 🐳 Result
    - name: Build & Push Result
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/result-service:latest ./result-service
        docker push ${{ secrets.DOCKER_USERNAME }}/result-service:latest
